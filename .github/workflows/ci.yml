name: CI
on:
  push:
    branches: [main, develop]
    paths: ["src/**", "tests/**", ".github/workflows/ci.yml"]
  pull_request:
    branches: [main, develop]
    paths: ["src/**", "tests/**", ".github/workflows/ci.yml"]
  workflow_dispatch:

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python ${{ matrix.python-version }} & dependencies
        run: uv sync --all-extras --all-groups --upgrade --python ${{ matrix.python-version }}

      - name: Run ruff lint check
        run: uv run ruff check src tests

      - name: Run ruff format check
        run: uv run ruff format src tests

      - name: Run ty type check
        run: uv run ty check src tests

  tests:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python ${{ matrix.python-version }} & dependencies
        run: uv sync --all-extras --all-groups --upgrade --python ${{ matrix.python-version }}

      - name: Install external tool dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ncbi-blast+ mmseqs2 mummer progressivemauve last-align
        if: ${{ matrix.os=='ubuntu-latest' }}

      - name: Run pytest
        run: uv run pytest
